<div class="social-body"><div class="social-body-inner">
  <p class="section-label">Week 1 — Launch Week</p>
  <h2 class="section-h2" style="margin-bottom:40px;">Content <em>Schedule</e<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  setTimeout(() => {
    ring.style.left = e.clientX + 'px';
    ring.style.top = e.clientY + 'px';
  }, 60);
});
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => { cursor.classList.add('hover'); ring.classList.add('hover'); });
  el.addEventListener('mouseleave', () => { cursor.classList.remove('hover'); ring.classList.remove('hover'); });
});

window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 40);
});

const pc = document.getElementById('particles');
if (pc) {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left:${Math.random()*100}%;
      top:${30+Math.random()*60}%;
      --dur:${3+Math.random()*4}s;
      --delay:${Math.random()*5}s;
      --x1:${(Math.random()-0.5)*30}px;
      --y1:${Math.random()*20}px;
      --x2:${(Math.random()-0.5)*60}px;
      --y2:${-40-Math.random()*60}px;
    `;
    pc.appendChild(p);
  }
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const navEl = document.getElementById('nav-' + name);
  if (navEl) navEl.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  return false;
}

function filterScents(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.shop-card').forEach(card => {
    const g = card.dataset.gender;
    const t = card.dataset.type;
    const pr = parseInt(card.dataset.price);
    let show = true;
    if (filter === 'men' && g !== 'men') show = false;
    if (filter === 'women' && g !== 'women') show = false;
    if (filter === 'unisex' && g !== 'unisex') show = false;
    if (filter === 'niche' && t !== 'niche') show = false;
    if (filter === 'under20' && pr >= 20) show = false;
    card.style.display = show ? '' : 'none';
  });
}

function copyCaption(btn) {
  const text = btn.previousElementSibling.previousElementSibling.innerText + '\n\n' + btn.previousElementSibling.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Caption'; btn.classList.remove('copied'); }, 2200);
  });
}
</script>
